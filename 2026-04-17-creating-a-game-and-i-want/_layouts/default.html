<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand-mark">TB</span>
          <span>
            <strong>{{ site.title }}</strong>
            <small>Universe Archive</small>
          </span>
        </a>

        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/universe/' | relative_url }}">Lore</a>
          <a href="{{ '/updates/' | relative_url }}">Devlog</a>
          <a href="{{ '/gallery/' | relative_url }}">Gallery</a>
        </nav>
      </header>

      <main>
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>{{ site.title }} is a living worldbuilding and development archive.</p>
        <p>Built to publish from GitHub Pages with Markdown posts, screenshots, and art drops.</p>
      </footer>
    </div>
  </body>
</html>
